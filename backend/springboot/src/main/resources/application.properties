# Server Config
server.port=${PORT:8081}

# PostgreSQL Configuration (pgAdmin compatible)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:product_catalog}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:Rajnish@007}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# No MongoDB Configuration

# Logging Configurations
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
