# Server Config
server.port=8081

# PostgreSQL Configuration (pgAdmin compatible)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/product_catalog}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:Rajnish@02}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# MongoDB Configuration
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/product_catalog}


# Logging Configurations
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
