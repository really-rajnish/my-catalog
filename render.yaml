services:
  # 1. Spring Boot Backend
  - type: web
    name: nexus-springboot-service
    env: docker
    plan: free
    dockerContext: backend/springboot
    dockerfilePath: backend/springboot/Dockerfile
    envVars:
      - key: SERVER_PORT
        value: 8080
      - key: SPRING_PROFILES_ACTIVE
        value: local

  # 2. Node.js Backend
  - type: web
    name: nexus-node-service
    env: node
    plan: free
    rootDir: backend/nodejs
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production

  # 3. FastAPI Gateway
  - type: web
    name: nexus-gateway
    env: python
    plan: free
    rootDir: backend/gateway
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: AUTH_SERVICE_HOSTPORT
        value: nexus-springboot-service.onrender.com
      - key: NODE_SERVICE_HOSTPORT
        value: nexus-node-service.onrender.com

  # 4. React Frontend
  - type: web
    name: nexus-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://nexus-gateway.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
